<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07070e; --bg-2: #0c0c17; --bg-card: #0f0f1e;
      --border: rgba(255,255,255,0.07); --accent: #a78bfa; --accent-mid: #7c3aed;
      --accent-2: #e879f9; --text: #eeedfb; --text-muted: #7e7a9e;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px;
      background-image:
        linear-gradient(rgba(167,139,250,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,250,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .logo { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 28px; }
    h1 { font-size: clamp(32px, 6vw, 56px); font-weight: 900; letter-spacing: -2px; margin-bottom: 14px; }
    .sub { color: var(--text-muted); font-size: 16px; max-width: 380px; line-height: 1.7; margin-bottom: 48px; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
    a { text-decoration: none; color: inherit; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 28px; width: 240px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .card:hover {
      border-color: rgba(160,120,255,0.4);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(124,58,237,0.2);
    }
    .card-icon { font-size: 36px; }
    .card-title { font-size: 18px; font-weight: 800; letter-spacing: -0.4px; }
    .card-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .card-badge {
      margin-top: 4px; font-size: 11px; font-weight: 700;
      padding: 4px 12px; border-radius: 999px; letter-spacing: 0.3px;
    }
    .badge-purple { background: rgba(167,139,250,0.1); color: var(--accent); border: 1px solid rgba(167,139,250,0.2); }
    .badge-pink   { background: rgba(232,121,249,0.1); color: var(--accent-2); border: 1px solid rgba(232,121,249,0.2); }
  </style>
</head>
<body>
  <div class="logo">Our Projects</div>
  <h1>Choose a <span style="background:linear-gradient(125deg,#a78bfa,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Site</span></h1>
  <p class="sub">Two free browser extensions for Roblox players. Pick one below.</p>
  <div class="cards">
    <a href="joiner/">
      <div class="card">
        <div class="card-icon">🎮</div>
        <div class="card-title">RBLXjoinr</div>
        <div class="card-sub">Find and join Roblox games instantly with one click.</div>
        <span class="card-badge badge-purple">Game Finder</span>
      </div>
    </a>
    <a href="duper/">
      <div class="card">
        <div class="card-icon">⚔️</div>
        <div class="card-title">MM2 Duper</div>
        <div class="card-sub">Supercharge your Murder Mystery 2 experience.</div>
        <span class="card-badge badge-pink">MM2 Tool</span>
      </div>
    </a>
  </div>
</body>
</html>
